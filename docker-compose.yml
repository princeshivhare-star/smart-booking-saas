version: '3.9'

services:

  # ── MongoDB (no install needed) ──────────────────────────
  mongo:
    image: mongo:7
    container_name: smartbook_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - smartbook_net

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartbook_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/smart_booking
      JWT_SECRET: smartbook_default_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      # Optional — leave blank, app works without them
      STRIPE_SECRET_KEY: ""
      EMAIL_HOST: ""
      EMAIL_USER: ""
      EMAIL_PASS: ""
      EMAIL_FROM: noreply@smartbooking.com
    ports:
      - "5000:5000"
    networks:
      - smartbook_net

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartbook_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    networks:
      - smartbook_net

volumes:
  mongo_data:

networks:
  smartbook_net:
    driver: bridge
